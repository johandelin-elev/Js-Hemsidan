        <div class="checkout-panel">
            <div class="form-container checkout-container">
                <form class="checkout-form">
                    <div class="checkout-form-container">
                        <input type="text" id="form-name-input" placeholder="Name" required>
                        <div class="user-contact-container">
                            <input type="email" id="form-email-input" placeholder="Email" required>
                            <input type="tel" id="form-tel-input" placeholder="+46" pattern="[0-9]{10}" required>
                        </div>
                        <div class="location-container">
                            <select class="country-select" required>
                                <option class="country">🇸🇪 Sweden</option>
                                <option class="country">🇺🇸 United States</option>
                                <option class="country">🇬🇧 United Kingdom</option>
                                <option class="country">🇨🇦 Canada</option>
                                <option class="country">🇩🇪 Germany</option>
                                <option class="country">🇫🇷 France</option>
                                <option class="country">🇦🇺 Australia</option>
                                <option class="country">🇳🇱 Netherlands</option>
                                <option class="country">🇮🇳 India</option>
                                <option class="country">🇯🇵 Japan</option>
                                <option class="country">🇧🇷 Brazil</option>
                            </select>
                        </div>
                        <div class="city-code-container">
                            <input type="text" id="form-city-input" placeholder="Karlstad" pattern="[A-Z]" required>
                            <input type="text" id="form-postcode-input" placeholder="000 000" required>
                        </div>
                    </div>
                    <div class="payment-container">
                        <button class="credit-card-btn"></button>
                        <button class="currency-btn"></button>
                    </div>
                    <input type="submit" id="make-payment" required>
                </form>
            </div>

            <div class="product-container checkout-container">
                <div class="checkout-info-container">
                    <h3 class="product-text">Inte Färdigt..</h3>
                    <p class="total-amount">Total Amount</p>
                    <h1 class="total-amount-title">$50.00</h1>
                </div>
                <div class="order-summary-container"></div>
            </div>
